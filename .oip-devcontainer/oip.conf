[req]
default_bits = 2048
prompt = no
default_md = sha256
req_extensions = req_ext
distinguished_name = dn

[dn]
C = oi
ST = oip
CN = localhost

[req_ext]
subjectAltName = @alt_names
basicConstraints = critical, CA:false
keyUsage = critical, digitalSignature, keyEncipherment
extendedKeyUsage = serverAuth

[alt_names]
DNS.1 = localhost
DNS.2 = oip
DNS.3 = oip-applications
DNS.4 = oip-users
DNS.5 = oip-notifications
DNS.6 = keycloak
IP.1 = 127.0.0.1
IP.2 = ::1