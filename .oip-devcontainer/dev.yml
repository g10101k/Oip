services:
  oip:
    build:
      context: ../src
      dockerfile: ./Oip/Dockerfile
      additional_contexts:
        oip-dev-https: ./https
    ports:
      - "50002:50002"
    volumes:
      - ./https:/https:ro
    environment:
      TZ: Europe/Moscow
      ConnectionString: XpoProvider=Postgres;Server=postgres;Database=oip;uid=postgres;pwd=postgres;
      SecurityService:BaseUrl: https://localhost:8443/
      SecurityService:DockerUrl: https://keycloak:8443/
      SecurityService:AuthTicketStore:RedisConnectionString: redis:6379,password=${REDIS_PASSWORD:-P@ssw0rd},defaultDatabase=0
      KeycloakEvents:SharedSecret: change-me-keycloak-events
      DataProtection__PersistKeysToFileSystemPath: /PersistKeys
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: https://0.0.0.0:50002
      Kestrel__Endpoints__Https__Url: https://0.0.0.0:50002
      ASPNETCORE_Kestrel__Certificates__Default__Password: P@ssw0rd
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/oip.pfx
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy

  oip-users:
    profiles:
      - distributed
    build:
      context: ../src
      dockerfile: ./Oip.Users/Dockerfile
      additional_contexts:
        oip-dev-https: ./https
    ports:
      - "5005:5005"
    volumes:
      - ./https:/https:ro
    environment:
      TZ: Europe/Moscow
      ConnectionString: XpoProvider=Postgres;Server=postgres;Database=oip-users;uid=postgres;pwd=postgres;
      Services:OipApplications: https://oip-applications:5008
      Services:OipNotifications: https://oip-notifications:5007
      SecurityService:BaseUrl: https://localhost:8443/
      SecurityService:DockerUrl: https://keycloak:8443/
      SecurityService:AuthTicketStore:RedisConnectionString: redis:6379,password=${REDIS_PASSWORD:-P@ssw0rd},defaultDatabase=0
      KeycloakEvents:SharedSecret: change-me-keycloak-events
      DataProtection__PersistKeysToFileSystemPath: /PersistKeys
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: https://0.0.0.0:5005
      Kestrel__Endpoints__Https__Url: https://0.0.0.0:5005
      ASPNETCORE_Kestrel__Certificates__Default__Password: P@ssw0rd
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/oip.pfx
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy

  oip-applications:
    profiles:
      - distributed
    build:
      context: ../src
      dockerfile: ./Oip.Applications/Dockerfile
      additional_contexts:
        oip-dev-https: ./https
    ports:
      - "5008:5008"
    volumes:
      - ./https:/https:ro
    environment:
      TZ: Europe/Moscow
      ConnectionString: XpoProvider=Postgres;Server=postgres;Database=oip-application;uid=postgres;pwd=postgres;
      Services:OipNotifications: https://oip-notifications:5007
      SecurityService:BaseUrl: https://localhost:8443/
      SecurityService:DockerUrl: https://keycloak:8443/
      SecurityService:AuthTicketStore:RedisConnectionString: redis:6379,password=${REDIS_PASSWORD:-P@ssw0rd},defaultDatabase=0
      DataProtection__PersistKeysToFileSystemPath: /PersistKeys
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: https://0.0.0.0:5008
      Kestrel__Endpoints__Https__Url: https://0.0.0.0:5008
      ASPNETCORE_Kestrel__Certificates__Default__Password: P@ssw0rd
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/oip.pfx
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy

  oip-notifications:
    profiles:
      - distributed
    build:
      context: ../src
      dockerfile: ./Oip.Notifications/Dockerfile
      additional_contexts:
        oip-dev-https: ./https
    ports:
      - "5007:5007"
    volumes:
      - ./https:/https:ro
    environment:
      TZ: Europe/Moscow
      ConnectionString: XpoProvider=Postgres;Server=postgres;Database=oip-notification;uid=postgres;pwd=postgres;
      Services:OipApplications: https://oip-applications:5008
      Services:OipUsers: https://oip-users:5005
      SecurityService:BaseUrl: https://localhost:8443/
      SecurityService:DockerUrl: https://keycloak:8443/
      SecurityService:AuthTicketStore:RedisConnectionString: redis:6379,password=${REDIS_PASSWORD:-P@ssw0rd},defaultDatabase=0
      DataProtection__PersistKeysToFileSystemPath: /PersistKeys
      SmtpSettings:SmtpHost: mailhog
      SmtpSettings:SmtpPort: 1025
      SmtpSettings:EnableSsl: "false"
      SmtpSettings:SmtpAuthenticationEnabled: "false"
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: https://0.0.0.0:5007
      Kestrel__Endpoints__Https__Url: https://0.0.0.0:5007
      ASPNETCORE_Kestrel__Certificates__Default__Password: P@ssw0rd
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/oip.pfx
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
  
  postgres:
    image: postgres:16.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: keycloak
      PGDATA: /data/postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/data/postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d keycloak" ]
      interval: 5s
      timeout: 5s
      retries: 10
  
  keycloak:
    build:
      context: ./keycloak
      args:
        KEYCLOAK_VERSION: 26.6.3
        KEYCLOAK_EVENTS_VERSION: 0.61
    command: [ "start-dev", "--import-realm" ]
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_DB_URL: "jdbc:postgresql://postgres:5432/keycloak"
      KC_METRICS_ENABLED: true
      KEYCLOAK_ADMIN: ${GF_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-P@ssw0rd}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${GF_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-P@ssw0rd}
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/data/cert/oip.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/data/cert/oip.key
      KC_TRUSTSTORE_PATHS: /opt/keycloak/data/cert/dev-ca.crt
      KC_SPI_THEME_CACHE_THEMES: false
      KC_SPI_THEME_CACHE_TEMPLATES: false
    ports:
      - "8080:8080"
      - "8443:8443"
      - "9000:9000"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
      - ./https:/opt/keycloak/data/cert/:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000;echo -e 'GET /health/ready HTTP/1.1\r\nhost: http://localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;" ]
      interval: 5s
      timeout: 5s
      retries: 10
  
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"  # HTTP interface
      - "9001:9000"  # Native protocol
      - "9009:9009"  # Interserver communication
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - TZ=UTC
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=P@ssw0rd

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-P@ssw0rd}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-P@ssw0rd}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-P@ssw0rd}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
  
  prometheus:
    image:  registry.hub.docker.com/prom/prometheus:main
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image:  registry.hub.docker.com/grafana/grafana:main
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

  minio:
    image: minio/minio:latest
    command: server --console-address ":9001" /data
    ports:
      - "9010:9000"  # API port
      - "9011:9001"  # Console port
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=P@ssw0rd
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

volumes:
  postgres-data:
  pgadmin-data:
  pgadminhome-data:
  clickhouse_data:
  minio_data:
  redis-data:
